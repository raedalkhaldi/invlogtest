app = 'invlog-api'
primary_region = 'iad'

[build]

[env]
  NODE_OPTIONS = '--max-old-space-size=1500'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/api/v1/health"
    method = "GET"

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 2
